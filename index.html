<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS Web App Status Bar Fixes -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <title>Run Route Finder</title>
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for Elevation Profile -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* iOS style range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            cursor: pointer;
            margin-top: -10px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 3px;
        }
        
        /* iOS style toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }
        .toggle-checkbox {
            right: 4px;
            z-index: 1;
            border-color: #e2e8f0;
            transition: all 0.2s ease;
        }
        .toggle-label {
            background-color: #cbd5e1;
            transition: all 0.2s ease;
        }

        /* Lock html/body to fixed corners to prevent mobile browser drag/bounce and resize black bars */
        html, body { 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            -webkit-overflow-scrolling: touch;
            background-color: #f3f4f6; /* Light mode fallback background */
        }
        
        /* Dynamic iOS safe area subtraction */
        .controls-panel {
            padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
        }

        /* Hide default number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Hide scrollbar for POI list */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Colorful Dark Theme Filter */
        .theme-neon {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
            -webkit-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        @media (prefers-color-scheme: dark) {
            html, body { background-color: #111827; /* Dark mode fallback background */ }
            input[type=range]::-webkit-slider-runnable-track { background: #374151; }
            input[type=range]::-webkit-slider-thumb { background: #d1d5db; }
            .toggle-checkbox { border-color: #4b5563; }
            .toggle-label { background-color: #4b5563; }
        }
    </style>
</head>
<body class="overflow-hidden font-sans text-gray-900 dark:text-gray-100 antialiased">

    <!-- Map Area -->
    <div id="map" class="fixed inset-0 z-0 h-full w-full"></div>

    <!-- Notification / Status Banner -->
    <div id="status-bar" class="fixed top-[calc(1rem+env(safe-area-inset-top,0px))] left-4 right-4 z-20 flex justify-center pointer-events-none transition-all duration-300 opacity-0 transform -translate-y-2">
        <div id="status-message" class="bg-gray-900/95 dark:bg-gray-800/95 backdrop-blur text-white px-4 py-2.5 rounded-full text-sm font-medium shadow-lg pointer-events-auto">
            Status message
        </div>
    </div>

    <!-- Current Position/Recenter Button -->
    <button id="btn-recenter" class="fixed top-[calc(1rem+env(safe-area-inset-top,0px))] right-4 z-10 bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg text-gray-700 dark:text-gray-300 active:bg-gray-100 dark:active:bg-gray-700 hidden transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    </button>

    <!-- Slide-up Bottom Control Panel -->
    <div id="control-panel" class="fixed bottom-0 left-0 right-0 z-10 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.12)] controls-panel border-t border-gray-100 dark:border-gray-800 transition-all duration-300 transform translate-y-0 flex flex-col max-h-[82dvh]">
        
        <!-- Toggle Header (Drag Bar and quick metrics) -->
        <div id="panel-header" class="pt-4 pb-2 px-6 cursor-pointer flex flex-col items-center shrink-0">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mb-1"></div>
            <div id="route-quick-stats" class="hidden text-center text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                Selected: <span id="actual-distance" class="text-blue-600 dark:text-blue-400 font-bold">0.00</span> <span class="unit-label">mi</span> route
            </div>
            <svg id="panel-chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 dark:text-gray-500 transition-transform duration-300"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <!-- Elevation Profile Section (Persistent above collapsible content) -->
        <div id="elevation-section" class="px-6 hidden shrink-0 mb-2 mt-1">
            <div class="border border-gray-200 dark:border-gray-700 rounded-2xl p-3 bg-white/80 dark:bg-gray-800/80">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Elevation</label>
                    <div class="text-xs font-semibold text-gray-600 dark:text-gray-300">Gain: <span id="elevation-gain" class="text-blue-600 dark:text-blue-400 font-bold">0</span> <span class="elev-unit-label">ft</span></div>
                </div>
                <div class="h-24 w-full relative">
                    <canvas id="elevation-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Main Form Fields (collapsible) - Removed flex-1 to prevent aggressive stretching -->
        <div id="panel-content" class="px-6 pb-2 overflow-y-auto transition-all duration-300 shrink min-h-0">
            
            <!-- Tab Navigation -->
            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-4 sticky top-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur z-10 pt-1">
                <button id="tab-route" class="flex-1 pb-2 text-sm font-bold text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400 transition-colors">Route</button>
                <button id="tab-settings" class="flex-1 pb-2 text-sm font-bold text-gray-400 dark:text-gray-500 border-b-2 border-transparent transition-colors hover:text-gray-600 dark:hover:text-gray-300">Settings</button>
            </div>

            <!-- Route Tab Content -->
            <div id="content-route">
                <!-- Location Setup -->
                <div class="mb-5">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 block">Starting Point</label>
                    <div class="flex space-x-1 mb-2.5 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
                        <button id="mode-gps" class="flex-1 py-1.5 text-xs font-semibold bg-white dark:bg-gray-600 shadow rounded-lg text-blue-600 dark:text-blue-400 transition">My GPS</button>
                        <button id="mode-address" class="flex-1 py-1.5 text-xs font-semibold text-gray-500 dark:text-gray-400 rounded-lg transition hover:text-gray-700 dark:hover:text-gray-200">Address</button>
                        <button id="mode-map" class="flex-1 py-1.5 text-xs font-semibold text-gray-500 dark:text-gray-400 rounded-lg transition hover:text-gray-700 dark:hover:text-gray-200">Tap Map</button>
                    </div>
                    
                    <div id="address-container" class="hidden flex gap-2">
                        <input type="text" id="address-input" placeholder="Enter street, city or zip" class="flex-1 border border-gray-200 dark:border-gray-700 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 bg-white dark:bg-gray-800 dark:text-gray-100">
                        <button id="btn-search-address" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-xl text-sm font-semibold transition">Search</button>
                    </div>
                    
                    <div id="map-prompt" class="hidden text-xs text-blue-600 dark:text-blue-400 font-medium text-center py-2.5 bg-blue-50 dark:bg-blue-900/30 border border-blue-100 dark:border-blue-800 rounded-xl">
                        Tap anywhere on the map to set your runner icon.
                    </div>
                </div>

                <!-- Target Run Distance Inputs -->
                <div class="flex justify-between items-end mb-2">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Target Distance</label>
                    <div class="flex items-baseline text-blue-600 dark:text-blue-400">
                        <input type="number" id="distance-input" value="3.0" min="0.1" step="0.1" class="text-2xl font-bold bg-transparent text-right w-20 focus:outline-none border-b border-transparent focus:border-blue-300 dark:focus:border-blue-500 dark:text-gray-100 transition-colors">
                        <span class="text-sm font-semibold text-gray-400 dark:text-gray-500 ml-0.5 unit-label">mi</span>
                    </div>
                </div>
                
                <div class="mb-5 relative pt-1">
                    <input type="range" id="distance-slider" min="0.5" max="21" step="0.5" value="3.0">
                </div>

                <!-- Points of Interest Section -->
                <div id="poi-section" class="mb-2 hidden">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 block">Points of Interest</label>
                    <div id="poi-list" class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                        <!-- POI chips will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Settings Tab Content -->
            <div id="content-settings" class="hidden">
                
                <!-- Loop Settings Toggle -->
                <div class="flex items-center justify-between mb-5 bg-gray-50 dark:bg-gray-800/50 p-3.5 rounded-2xl border border-gray-100 dark:border-gray-700">
                    <div>
                        <div class="text-sm font-semibold text-gray-800 dark:text-gray-200">Round Trip Route</div>
                        <div class="text-xs text-gray-400 dark:text-gray-500">Start and end at same point</div>
                    </div>
                    
                    <div class="relative inline-block w-14 align-middle select-none transition duration-200">
                        <input type="checkbox" name="toggle" id="loop-toggle" class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 appearance-none cursor-pointer" checked/>
                        <label for="loop-toggle" class="toggle-label block overflow-hidden h-7 rounded-full bg-gray-200 cursor-pointer"></label>
                    </div>
                </div>

                <!-- Avoid Segments -->
                <div class="mb-5">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 block">Avoid on Route</label>
                    <div class="grid grid-cols-2 gap-y-3 gap-x-2 bg-gray-50 dark:bg-gray-800/50 p-3.5 rounded-2xl border border-gray-100 dark:border-gray-700">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" value="motorway" class="avoid-cb h-4 w-4 text-blue-600 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700" checked>
                            <span class="text-sm font-semibold text-gray-800 dark:text-gray-200">Highways</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" value="trunk" class="avoid-cb h-4 w-4 text-blue-600 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                            <span class="text-sm font-semibold text-gray-800 dark:text-gray-200">Busy Roads</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" value="ferry" class="avoid-cb h-4 w-4 text-blue-600 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700" checked>
                            <span class="text-sm font-semibold text-gray-800 dark:text-gray-200">Ferries</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" value="steps" class="avoid-cb h-4 w-4 text-blue-600 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                            <span class="text-sm font-semibold text-gray-800 dark:text-gray-200">Steps</span>
                        </label>
                    </div>
                </div>

                <!-- Map Theme Selector -->
                <div class="mb-5">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 block">Map Theme</label>
                    <select id="map-theme" class="w-full border border-gray-200 dark:border-gray-700 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-200">
                        <option value="voyager">Standard (Light)</option>
                        <option value="osm">High Contrast (Day)</option>
                        <option value="hot">Humanitarian (Detailed)</option>
                        <option value="neon">Vibrant Night (Color Dark)</option>
                        <option value="dark">Dark Matter (Muted Night)</option>
                        <option value="topo">Topographical</option>
                        <option value="satellite">Satellite</option>
                    </select>
                </div>

                <!-- Distance Limits & Variance -->
                <div class="mb-5">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 block">Slider Maximum Limit (<span class="unit-label">mi</span>)</label>
                    <input type="number" id="slider-max-input" value="21" min="1" class="w-full border border-gray-200 dark:border-gray-700 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-200 mb-5">
                    
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Min Allowance (<span class="unit-label">mi</span>)</label>
                                <span id="variance-min-val" class="text-xs font-semibold text-blue-600 dark:text-blue-400">1.0</span>
                            </div>
                            <input type="range" id="variance-min" min="0" max="5" step="0.1" value="1.0">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Max Allowance (<span class="unit-label">mi</span>)</label>
                                <span id="variance-max-val" class="text-xs font-semibold text-blue-600 dark:text-blue-400">1.0</span>
                            </div>
                            <input type="range" id="variance-max" min="0" max="5" step="0.1" value="1.0">
                        </div>
                    </div>
                </div>

                <!-- Unit Config (Moved to bottom) -->
                <div class="mb-5">
                    <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 block">Measurement Units</label>
                    <select id="unit-select" class="w-full border border-gray-200 dark:border-gray-700 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-200">
                        <option value="mi">Imperial (Miles / Feet)</option>
                        <option value="km">Metric (Kilometers / Meters)</option>
                    </select>
                </div>

                <hr class="border-gray-200 dark:border-gray-700 my-6">

                <div class="space-y-3">
                    <button id="btn-export-gpx" class="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition duration-150 flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export to GPX
                    </button>

                    <button id="btn-reset-app" class="w-full bg-red-100 dark:bg-red-900/30 hover:bg-red-200 dark:hover:bg-red-900/50 active:bg-red-300 text-red-700 dark:text-red-400 font-bold py-3 px-4 rounded-xl transition duration-150 flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        Force Reset App
                    </button>
                </div>
            </div>
        </div>

        <!-- Persistent Generate Button (Outside collapsible content, packed with tight bottom margins) -->
        <div class="px-6 pb-2 pt-1 bg-transparent shrink-0">
            <button id="btn-generate" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 px-4 rounded-2xl shadow-lg transition duration-150 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                Find Route
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // App State
        let map;
        let currentTileLayer;
        let userLocation = null;
        let routeLayer = null;
        let markers = [];
        let poiMarkers = [];
        let startMarker = null;
        let hoverMarker = null;
        let elevationChart = null;
        let locationMode = 'gps';
        let isPanelOpen = true;
        
        // Element Hooks
        const distanceSlider = document.getElementById('distance-slider');
        const distanceInput = document.getElementById('distance-input');
        const sliderMaxInput = document.getElementById('slider-max-input');
        const loopToggle = document.getElementById('loop-toggle');
        const btnGenerate = document.getElementById('btn-generate');
        const btnRecenter = document.getElementById('btn-recenter');
        const statusBar = document.getElementById('status-bar');
        const statusMessage = document.getElementById('status-message');
        const routeQuickStats = document.getElementById('route-quick-stats');
        const actualDistance = document.getElementById('actual-distance');

        const panelHeader = document.getElementById('panel-header');
        const panelContent = document.getElementById('panel-content');
        const panelChevron = document.getElementById('panel-chevron');
        const controlPanel = document.getElementById('control-panel');

        const modeGps = document.getElementById('mode-gps');
        const modeAddress = document.getElementById('mode-address');
        const modeMap = document.getElementById('mode-map');
        const addressContainer = document.getElementById('address-container');
        const mapPrompt = document.getElementById('map-prompt');
        const addressInput = document.getElementById('address-input');
        const btnSearchAddress = document.getElementById('btn-search-address');
        const poiSection = document.getElementById('poi-section');
        const poiList = document.getElementById('poi-list');
        const elevationSection = document.getElementById('elevation-section');
        const elevationGain = document.getElementById('elevation-gain');
        const mapThemeSelect = document.getElementById('map-theme');
        const btnExportGpx = document.getElementById('btn-export-gpx');
        const btnResetApp = document.getElementById('btn-reset-app');
        
        // New Hooks
        const unitSelect = document.getElementById('unit-select');
        const varianceMin = document.getElementById('variance-min');
        const varianceMax = document.getElementById('variance-max');
        const varianceMinVal = document.getElementById('variance-min-val');
        const varianceMaxVal = document.getElementById('variance-max-val');
        const unitLabels = document.querySelectorAll('.unit-label');
        const elevUnitLabels = document.querySelectorAll('.elev-unit-label');

        // Tab Hooks
        const tabRoute = document.getElementById('tab-route');
        const tabSettings = document.getElementById('tab-settings');
        const contentRoute = document.getElementById('content-route');
        const contentSettings = document.getElementById('content-settings');

        // Conversion and Coordinate Constants
        const METERS_PER_MILE = 1609.34;
        const EARTH_RADIUS_M = 6371e3;

        const tileLayers = {
            'voyager': { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', class: '' },
            'osm': { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', class: '' },
            'hot': { url: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', class: '' },
            'dark': { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', class: '' },
            'neon': { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', class: 'theme-neon' }, // Inverted OSM
            'satellite': { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', class: '' },
            'topo': { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', class: '' }
        };

        // Initialize Chart.js global text color for dark mode
        Chart.defaults.color = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? '#9ca3af' : '#6b7280';

        // Init App and Map Setup
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([42.24, -71.17], 13);
            
            // Apply text colors for elevation chart based on user's theme preference
            Chart.defaults.color = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? '#9ca3af' : '#6b7280';
            
            // Auto-set initial map theme based on system setting
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = prefersDark ? 'neon' : 'voyager';
            mapThemeSelect.value = initialTheme;

            currentTileLayer = L.tileLayer(tileLayers[initialTheme].url, {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: initialTheme === 'topo' ? 17 : 19,
                className: tileLayers[initialTheme].class
            }).addTo(map);

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                Chart.defaults.color = e.matches ? '#9ca3af' : '#6b7280';
                if (elevationChart) elevationChart.update();
                
                const newTheme = e.matches ? 'neon' : 'voyager';
                mapThemeSelect.value = newTheme;
                mapThemeSelect.dispatchEvent(new Event('change'));
            });

            map.on('click', (e) => {
                if (locationMode === 'map') {
                    updateStartMarker(e.latlng.lat, e.latlng.lng);
                }
            });

        function showStatus(msg, isError = true) {

        // Acquire System GPS Signals
        function getUserLocation() {
            if (!navigator.geolocation) {
                showStatus("GPS is unsupported in this browser.");

            showStatus("Searching for GPS point...", false);

            navigator.geolocation.getCurrentPosition(
                (position) => {

                },
                (error) => {

                { enableHighAccuracy: true, timeout: 6000 }
            );
        }

        btnRecenter.addEventListener('click', () => {

        });

        function getDestination(lat, lng, distanceMeters, bearingDegrees) {
            const brng = bearingDegrees * Math.PI / 180;
            const lat1 = lat * Math.PI / 180;
            const lon1 = lng * Math.PI / 180;

            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceMeters / EARTH_RADIUS_M) +
                                   Math.cos(lat1) * Math.sin(distanceMeters / EARTH_RADIUS_M) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distanceMeters / EARTH_RADIUS_M) * Math.cos(lat1),
                                           Math.cos(distanceMeters / EARTH_RADIUS_M) - Math.sin(lat1) * Math.sin(lat2));

            return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
        }

        btnGenerate.addEventListener('click', async () => {
            if (!userLocation) {
                showStatus("No start location selected.");
                return;
            }

            const targetDistance = parseFloat(distanceInput.value);
            const isLoop = loopToggle.checked;
            
            const isMetric = unitSelect.value === 'km';
            const multiplier = isMetric ? 1000 : METERS_PER_MILE;
            const targetMeters = targetDistance * multiplier;
            
            const minAllowed = Math.max(0.1, targetDistance - parseFloat(varianceMin.value));
            const maxAllowed = targetDistance + parseFloat(varianceMax.value);
            
            // Get selected avoid parameters
            const avoidClasses = Array.from(document.querySelectorAll('.avoid-cb:checked')).map(cb => cb.value);
            const excludeParam = avoidClasses.length > 0 ? `&exclude=${avoidClasses.join(',')}` : '';

            btnGenerate.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...`;
            btnGenerate.disabled = true;

            try {
                const [startLat, startLng] = userLocation;
                const baseBearing = Math.random() * 360;
                
                let bestRouteData = null;
                let bestDiff = Infinity;
                let currentRequestMeters = targetMeters;
                const maxAttempts = 5;

                // Optimization Loop: Adjust requested distance if the physical routing is out of bounds
                for (let i = 0; i < maxAttempts; i++) {
                    let waypoints = [];
                    
                    if (isLoop) {
                        const radius = currentRequestMeters / 4; 
                        const pt1 = getDestination(startLat, startLng, radius, baseBearing - 45);
                        const pt2 = getDestination(startLat, startLng, radius * 1.35, baseBearing);
                        const pt3 = getDestination(startLat, startLng, radius, baseBearing + 45);

                        waypoints = [
                            [startLng, startLat],
                            [pt1[1], pt1[0]],
                            [pt2[1], pt2[0]],
                            [pt3[1], pt3[0]],
                            [startLng, startLat]
                        ];
                    } else {
                        const endPoint = getDestination(startLat, startLng, currentRequestMeters, baseBearing);
                        waypoints = [
                            [startLng, startLat],
                            [endPoint[1], endPoint[0]]
                        ];
                    }

                    const coordString = waypoints.map(wp => `${wp[0]},${wp[1]}`).join(';');
                    let url = `https://router.project-osrm.org/route/v1/foot/${coordString}?overview=full&geometries=geojson${excludeParam}`;

                    let response = await fetch(url);
                    let data = await response.json();

                    // Fallback if public server rejects avoid parameters for this region/profile
                    if (data.code === 'InvalidValue' || (data.message && data.message.includes('exclude'))) {
                        if (i === 0) showStatus("Avoid settings not supported here. Using standard route.", true);
                        url = `https://router.project-osrm.org/route/v1/foot/${coordString}?overview=full&geometries=geojson`;
                        response = await fetch(url);
                        data = await response.json();
                    }

                    if (data.code !== 'Ok') throw new Error("OSRM Routing failure.");
                    
                    const actualDistanceMeters = data.routes[0].distance;
                    const actualValue = actualDistanceMeters / multiplier;
                    
                    const diff = Math.abs(actualValue - targetDistance);
                    
                    if (diff < bestDiff) {
                        bestDiff = diff;
                        bestRouteData = data;
                    }

                    // If route is within user's allowed tolerance, break early and use it
                    if (actualValue >= minAllowed && actualValue <= maxAllowed) {
                        bestRouteData = data;
                        break;
                    }

                    // Otherwise calculate compensation factor for the next attempt
                    let ratio = targetMeters / actualDistanceMeters;
                    // Dampen the ratio so it doesn't overshoot wildly
                    currentRequestMeters = currentRequestMeters * ((ratio + 1) / 2);
                    
                    if (i === 0) showStatus("Refining route distance...");
                }

                const routeGeoJSON = bestRouteData.routes[0].geometry;
                const finalDistanceMeters = bestRouteData.routes[0].distance;
                const finalValue = (finalDistanceMeters / multiplier).toFixed(2);

                drawRoute(routeGeoJSON, isLoop);
                await loadElevationProfile(routeGeoJSON.coordinates, isMetric);
                
                actualDistance.textContent = finalValue;
                routeQuickStats.classList.remove('hidden');
                
                togglePanel(false);
                
                if (parseFloat(finalValue) < minAllowed || parseFloat(finalValue) > maxAllowed) {
                    showStatus("Best match found outside requested allowance.", true);
                } else {
                    showStatus("Route successfully generated.", false);
                }

            } catch (err) {
                console.error(err);
                showStatus("Routing error. Try another distance value.", true);
            } finally {
                btnGenerate.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Find Route`;
                btnGenerate.disabled = false;
            }
        });

        function drawRoute(geoJSON, isLoop) {
            if (routeLayer) map.removeLayer(routeLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            poiMarkers.forEach(m => map.removeLayer(m));
            poiMarkers = [];

            if (hoverMarker) map.removeLayer(hoverMarker);
            
            poiSection.classList.add('hidden');
            poiList.innerHTML = '';
            elevationSection.classList.add('hidden');

            routeLayer = L.geoJSON(geoJSON, {
                style: {
                    color: '#2563eb',
                    weight: 6,
                    opacity: 0.85,
                    lineCap: 'round',
                    lineJoin: 'round'
                }
            }).addTo(map);

            const coords = geoJSON.coordinates;
            const start = [coords[0][1], coords[0][0]];
            const end = [coords[coords.length-1][1], coords[coords.length-1][0]];

            const startIcon = L.divIcon({
                html: `<div class="bg-emerald-500 w-4.5 h-4.5 rounded-full border-2 border-white shadow-lg"></div>`,
                className: '', iconSize: [18, 18], iconAnchor: [9, 9]
            });
            markers.push(L.marker(start, { icon: startIcon }).addTo(map));

            if (!isLoop) {
                const endIcon = L.divIcon({
                    html: `<div class="bg-rose-500 w-4.5 h-4.5 rounded-full border-2 border-white shadow-lg"></div>`,
                    className: '', iconSize: [18, 18], iconAnchor: [9, 9]
                });
                markers.push(L.marker(end, { icon: endIcon }).addTo(map));
            }

            map.fitBounds(routeLayer.getBounds(), {
                paddingBottomRight: [0, 220], 
                paddingTopLeft: [24, 100]
            });
            
            loadPOIs(routeLayer.getBounds());
        }

        async function loadElevationProfile(coords, isMetric) {
            try {
                elevationSection.classList.remove('hidden');
                elevationGain.textContent = "...";
                
                const multiplier = isMetric ? 1000 : METERS_PER_MILE;
                const targetPoints = 40;
                const step = Math.max(1, Math.floor(coords.length / targetPoints));
                const sampledCoords = [];
                const cumulativeDistances = [0];
                let currentDist = 0;

                for (let i = 0; i < coords.length; i += step) {
                    sampledCoords.push(coords[i]);
                    if (sampledCoords.length > 1) {
                        const prev = sampledCoords[sampledCoords.length - 2];
                        const curr = sampledCoords[sampledCoords.length - 1];
                        const d = map.distance([prev[1], prev[0]], [curr[1], curr[0]]);
                        currentDist += (d / multiplier);
                    }
                    if (sampledCoords.length > 1) {
                        cumulativeDistances.push(currentDist);
                    }
                }

                if (sampledCoords[sampledCoords.length - 1] !== coords[coords.length - 1]) {
                    const lastPt = coords[coords.length - 1];
                    const prev = sampledCoords[sampledCoords.length - 1];
                    const d = map.distance([prev[1], prev[0]], [lastPt[1], lastPt[0]]);
                    sampledCoords.push(lastPt);
                    cumulativeDistances.push(currentDist + (d / multiplier));
                }

                const lats = sampledCoords.map(c => c[1].toFixed(4)).join(',');
                const lons = sampledCoords.map(c => c[0].toFixed(4)).join(',');

                const res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.reason || "Open-Meteo API Error");
                if (!data.elevation) throw new Error("No elevation data returned: " + JSON.stringify(data));

                // Convert to feet if imperial, stay meters if metric
                const elevations = data.elevation.map(m => isMetric ? m : m * 3.28084);
                
                let gain = 0;
                for (let i = 1; i < elevations.length; i++) {
                    const diff = elevations[i] - elevations[i-1];
                    if (diff > 0) gain += diff;
                }
                
                elevationGain.textContent = Math.round(gain).toLocaleString();
                renderElevationChart(cumulativeDistances, elevations, sampledCoords, isMetric);
                
            } catch (err) {
                console.error("Elevation Error:", err);
                elevationSection.classList.add('hidden');
            }
        }

        function renderElevationChart(distances, elevations, coords, isMetric) {
            const ctx = document.getElementById('elevation-chart').getContext('2d');
            if (elevationChart) elevationChart.destroy();

            const distLabel = isMetric ? 'km' : 'mi';
            const elevLabel = isMetric ? 'm' : 'ft';

            elevationChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: distances.map(d => d.toFixed(2)),
                    datasets: [{
                        data: elevations,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#f59e0b',
                        pointHoverBorderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            displayColors: false,
                            callbacks: {
                                title: (ctx) => `${ctx[0].label} ${distLabel}`,
                                label: (ctx) => `${Math.round(ctx.raw)} ${elevLabel}`
                            }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: { display: true, position: 'right', ticks: { maxTicksLimit: 5, font: { size: 10 } } }
                    },
                    onHover: (e, activeElements) => {
                        if (activeElements.length > 0) {
                            const index = activeElements[0].index;
                            const pt = coords[index];
                            updateHoverMarker(pt[1], pt[0]);
                        } else {
                            if (hoverMarker) map.removeLayer(hoverMarker);
                        }
                    }
                }
            });
        }

        function updateHoverMarker(lat, lng) {
            if (!hoverMarker) {
                hoverMarker = L.circleMarker([lat, lng], {
                    radius: 6,
                    fillColor: "#f59e0b",
                    color: "#ffffff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 1
                }).addTo(map);
            } else {
                hoverMarker.setLatLng([lat, lng]);
                if (!map.hasLayer(hoverMarker)) hoverMarker.addTo(map);
            }
        }

        async function loadPOIs(bounds) {
            const bbox = `${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()}`;
            
            // Expanded query to catch more places
            const query = `
                [out:json][timeout:10];
                (
                  node["amenity"~"drinking_water|toilets|cafe|restaurant|pub"](${bbox});
                  node["leisure"~"park|playground"](${bbox});
                  node["tourism"~"viewpoint|museum|monument"](${bbox});
                  node["shop"~"convenience|supermarket"](${bbox});
                );
                out body 60;
            `;
            
            try {
                poiList.innerHTML = `<div class="text-xs text-gray-500 italic py-2">Searching for POIs along route...</div>`;
                poiSection.classList.remove('hidden');
                
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                poiList.innerHTML = '';
                
                if (!data.elements || data.elements.length === 0) {
                    poiList.innerHTML = `<div class="text-xs text-gray-500 italic py-2">No prominent POIs found.</div>`;
                    return;
                }

                const uniqueElements = [];
                const seenCoords = new Set();
                
                for (const el of data.elements) {
                    const coordKey = `${el.lat.toFixed(4)},${el.lon.toFixed(4)}`;
                    if (!seenCoords.has(coordKey)) {
                        seenCoords.add(coordKey);
                        uniqueElements.push(el);
                    }
                }

                // Show up to 40 POIs instead of 10
                uniqueElements.slice(0, 40).forEach(el => {
                    let type = 'Location';
                    let icon = '📍';
                    let color = 'bg-gray-500';
                    
                    const t = el.tags;
                    if (t.amenity === 'drinking_water') { type = 'Water'; icon = '💧'; color = 'bg-blue-500'; }
                    else if (t.amenity === 'toilets') { type = 'Restroom'; icon = '🚻'; color = 'bg-slate-500'; }
                    else if (t.amenity === 'cafe') { type = 'Cafe'; icon = '☕'; color = 'bg-amber-600'; }
                    else if (t.amenity === 'restaurant' || t.amenity === 'pub') { type = 'Food/Drink'; icon = '🍔'; color = 'bg-orange-500'; }
                    else if (t.leisure === 'park' || t.leisure === 'playground') { type = 'Park'; icon = '🌳'; color = 'bg-green-500'; }
                    else if (t.tourism === 'viewpoint' || t.tourism === 'monument' || t.tourism === 'museum') { type = 'Sight'; icon = '🏔️'; color = 'bg-purple-500'; }
                    else if (t.shop) { type = 'Store'; icon = '🏪'; color = 'bg-teal-500'; }

                    const name = el.tags.name || type;

                    const markerIcon = L.divIcon({
                        html: `<div class="flex items-center justify-center w-6 h-6 ${color} text-white text-xs rounded-full shadow-md border-2 border-white">${icon}</div>`,
                        className: '',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    
                    const marker = L.marker([el.lat, el.lon], { icon: markerIcon }).bindPopup(name).addTo(map);
                    poiMarkers.push(marker);

                    const chip = document.createElement('div');
                    chip.className = 'flex-shrink-0 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-2 flex items-center gap-2 shadow-sm cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors';
                    chip.innerHTML = `<span class="text-base leading-none">${icon}</span><span class="text-xs font-semibold text-gray-700 dark:text-gray-200 whitespace-nowrap pr-1">${name}</span>`;
                    
                    chip.addEventListener('click', () => {
                        map.setView([el.lat, el.lon], 16);
                        marker.openPopup();
                    });
                    
                    poiList.appendChild(chip);
                });
                
            } catch (err) {
                console.error("POI Error:", err);
                poiList.innerHTML = `<div class="text-xs text-gray-500 italic py-2">Could not load POIs.</div>`;
            }
        }

        btnExportGpx.addEventListener('click', () => {
            if (!routeLayer) {
                showStatus("Generate a route first to export.", true);
                return;
            }

            const geoJSON = routeLayer.toGeoJSON();
            let coords = [];
            
            if (geoJSON.type === 'FeatureCollection') {
                geoJSON.features.forEach(f => {
                    if (f.geometry && f.geometry.type === 'LineString') {
                        coords = coords.concat(f.geometry.coordinates);
                    }
                });
            } else if (geoJSON.type === 'Feature' && geoJSON.geometry.type === 'LineString') {
                coords = geoJSON.geometry.coordinates;
            } else if (geoJSON.type === 'LineString') {
                coords = geoJSON.coordinates;
            }

            if (coords.length === 0) {
                showStatus("No coordinate data found.", true);
                return;
            }

            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            gpx += `<gpx version="1.1" creator="Run Route Finder">\n`;
            gpx += `  <trk>\n    <name>Run Route</name>\n    <trkseg>\n`;
            
            coords.forEach(c => {
                gpx += `      <trkpt lat="${c[1]}" lon="${c[0]}"></trkpt>\n`;
            });
            
            gpx += `    </trkseg>\n  </trk>\n</gpx>`;

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `route_${new Date().toISOString().slice(0,10)}.gpx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus("GPX file downloaded.", false);
        });

        // Thoroughly unregister SWs, clear caches, wipe storage, and reload safely within PWA sandbox
        btnResetApp.addEventListener('click', async () => {
            showStatus("Resetting app...", false);
            
            try {
                localStorage.clear();
                sessionStorage.clear();
            } catch (e) { console.error(e); }

            if ('serviceWorker' in navigator) {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let reg of registrations) {
                        await reg.unregister();
                    }
                } catch (e) { console.error(e); }
            }

            if ('caches' in window) {
                try {
                    const keys = await caches.keys();
                    for (let key of keys) {
                        await caches.delete(key);
                    }
                } catch (e) { console.error(e); }
            }

            setTimeout(() => {
                window.location.reload();
            }, 500);
        });

        window.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
