<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Run Route Finder</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* iOS style range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-top: -10px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 3px;
        }
        
        /* iOS style toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #68D391;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4ade80;
        }
        .toggle-checkbox {
            right: 4px;
            z-index: 1;
            border-color: #e2e8f0;
            transition: all 0.2s ease;
        }
        .toggle-label {
            background-color: #cbd5e1;
            transition: all 0.2s ease;
        }

        #map { height: 100dvh; width: 100vw; }
        
        /* Ensure bottom panel stays above map and handles safe areas */
        .controls-panel {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="overflow-hidden bg-gray-100 font-sans text-gray-900">

    <!-- Map Container -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- Top Status / Error Bar -->
    <div id="status-bar" class="absolute top-4 left-4 right-4 z-10 flex justify-center hidden">
        <div id="status-message" class="bg-gray-800 text-white px-4 py-2 rounded-full text-sm font-medium shadow-md">
            Status message
        </div>
    </div>

    <!-- Recenter Button -->
    <button id="btn-recenter" class="absolute top-4 right-4 z-10 bg-white p-3 rounded-full shadow-lg text-gray-700 active:bg-gray-100 hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
    </button>

    <!-- Bottom Controls Panel -->
    <div class="absolute bottom-0 left-0 right-0 z-10 bg-white/90 backdrop-blur-md rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.1)] controls-panel border-t border-gray-200">
        
        <div class="p-6 pb-2 max-h-[85vh] overflow-y-auto">
            <!-- Drag Handle indicator -->
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5"></div>

            <!-- Location Selector -->
            <div class="mb-5">
                <label class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 block">Start Location</label>
                <div class="flex space-x-1 mb-2 bg-gray-100 p-1 rounded-lg">
                    <button id="mode-gps" class="flex-1 py-1.5 text-sm font-medium bg-white shadow rounded-md text-blue-600 transition">GPS</button>
                    <button id="mode-address" class="flex-1 py-1.5 text-sm font-medium text-gray-500 rounded-md transition hover:text-gray-700">Address</button>
                    <button id="mode-map" class="flex-1 py-1.5 text-sm font-medium text-gray-500 rounded-md transition hover:text-gray-700">Map Click</button>
                </div>
                
                <div id="address-container" class="hidden flex gap-2">
                    <input type="text" id="address-input" placeholder="City or address" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 bg-white">
                    <button id="btn-search-address" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-medium transition">Search</button>
                </div>
                
                <div id="map-prompt" class="hidden text-sm text-gray-500 italic text-center py-2 bg-blue-50 rounded-lg border border-blue-100">
                    Tap anywhere on the map to set your starting point.
                </div>
            </div>

            <div class="flex justify-between items-end mb-2">
                <label class="text-sm font-bold text-gray-500 uppercase tracking-wider">Distance</label>
                <div class="flex items-baseline text-blue-600">
                    <input type="number" id="distance-input" value="3.0" min="0.1" step="0.1" class="text-2xl font-bold bg-transparent text-right w-24 focus:outline-none border-b-2 border-transparent focus:border-blue-300 transition-colors">
                    <span class="text-lg text-gray-500 ml-1">mi</span>
                </div>
            </div>
            
            <div class="mb-6 flex items-center gap-4">
                <div class="flex-1 relative pt-1">
                    <input type="range" id="distance-slider" min="0.5" max="15" step="0.5" value="3.0">
                </div>
                <div class="flex flex-col items-center">
                    <label for="slider-max-input" class="text-[10px] text-gray-400 font-bold uppercase">Max (mi)</label>
                    <input type="number" id="slider-max-input" value="15" min="1" class="w-12 text-center text-sm border-b border-gray-300 focus:outline-none focus:border-blue-500 bg-transparent text-gray-600">
                </div>
            </div>

            <div class="flex items-center justify-between mb-6 bg-gray-100 p-3 rounded-xl">
                <div>
                    <div class="font-semibold text-gray-800">Round Trip</div>
                    <div class="text-xs text-gray-500">Start and end at same place</div>
                </div>
                
                <div class="relative inline-block w-14 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="loop-toggle" class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 appearance-none cursor-pointer" checked/>
                    <label for="loop-toggle" class="toggle-label block overflow-hidden h-7 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <button id="btn-generate" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 px-4 rounded-2xl shadow-lg transition duration-150 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                Find Route
            </button>
            
            <div id="route-stats" class="hidden mt-4 text-center text-sm font-medium text-gray-600">
                Generated route: <span id="actual-distance" class="text-blue-600 font-bold"></span> mi
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // App State
        let map;
        let userLocation = null;
        let routeLayer = null;
        let markers = [];
        let startMarker = null;
        let locationMode = 'gps';
        
        // DOM Elements
        const distanceSlider = document.getElementById('distance-slider');
        const distanceInput = document.getElementById('distance-input');
        const sliderMaxInput = document.getElementById('slider-max-input');
        const loopToggle = document.getElementById('loop-toggle');
        const btnGenerate = document.getElementById('btn-generate');
        const btnRecenter = document.getElementById('btn-recenter');
        const statusBar = document.getElementById('status-bar');
        const statusMessage = document.getElementById('status-message');
        const routeStats = document.getElementById('route-stats');
        const actualDistance = document.getElementById('actual-distance');

        const modeGps = document.getElementById('mode-gps');
        const modeAddress = document.getElementById('mode-address');
        const modeMap = document.getElementById('mode-map');
        const addressContainer = document.getElementById('address-container');
        const mapPrompt = document.getElementById('map-prompt');
        const addressInput = document.getElementById('address-input');
        const btnSearchAddress = document.getElementById('btn-search-address');

        // Math Constants
        const METERS_PER_MILE = 1609.34;
        const EARTH_RADIUS_M = 6371e3;

        // Init App
        function initMap() {
            // Default center
            map = L.map('map', { zoomControl: false }).setView([42.24, -71.17], 13);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors',
                maxZoom: 19
            }).addTo(map);

            // Map Click Listener for setting start location
            map.on('click', (e) => {
                if (locationMode === 'map') {
                    updateStartMarker(e.latlng.lat, e.latlng.lng);
                }
            });

            getUserLocation();
        }

        // Sync Slider and Number Input
        distanceSlider.addEventListener('input', (e) => {
            distanceInput.value = parseFloat(e.target.value).toFixed(1);
        });

        distanceInput.addEventListener('change', (e) => {
            let val = parseFloat(e.target.value);
            if (isNaN(val) || val <= 0) val = 1.0;
            distanceInput.value = val.toFixed(1);
            
            // If typed value exceeds slider max, increase slider max dynamically
            if (val > parseFloat(distanceSlider.max)) {
                const newMax = Math.ceil(val / 5) * 5;
                distanceSlider.max = newMax;
                sliderMaxInput.value = newMax;
            }
            distanceSlider.value = val;
        });

        // Handle Custom Slider Max
        sliderMaxInput.addEventListener('change', (e) => {
            let maxVal = parseFloat(e.target.value);
            if (isNaN(maxVal) || maxVal <= 0.5) maxVal = 1;
            
            sliderMaxInput.value = maxVal;
            distanceSlider.max = maxVal;
            
            if (parseFloat(distanceInput.value) > maxVal) {
                distanceSlider.value = maxVal;
            }
        });

        // Location Modes Logic
        function switchMode(newMode) {
            locationMode = newMode;
            // Reset styles
            [modeGps, modeAddress, modeMap].forEach(btn => {
                btn.classList.remove('bg-white', 'shadow', 'text-blue-600');
                btn.classList.add('text-gray-500');
            });
            
            addressContainer.classList.add('hidden');
            mapPrompt.classList.add('hidden');

            if (newMode === 'gps') {
                modeGps.classList.add('bg-white', 'shadow', 'text-blue-600');
                modeGps.classList.remove('text-gray-500');
                getUserLocation();
            } else if (newMode === 'address') {
                modeAddress.classList.add('bg-white', 'shadow', 'text-blue-600');
                modeAddress.classList.remove('text-gray-500');
                addressContainer.classList.remove('hidden');
            } else if (newMode === 'map') {
                modeMap.classList.add('bg-white', 'shadow', 'text-blue-600');
                modeMap.classList.remove('text-gray-500');
                mapPrompt.classList.remove('hidden');
            }
        }

        modeGps.addEventListener('click', () => switchMode('gps'));
        modeAddress.addEventListener('click', () => switchMode('address'));
        modeMap.addEventListener('click', () => switchMode('map'));

        // Geocoding Address Search
        btnSearchAddress.addEventListener('click', async () => {
            const addr = addressInput.value.trim();
            if (!addr) return;
            
            try {
                showStatus("Searching...", false);
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
                const data = await res.json();
                
                if (data && data.length > 0) {
                    updateStartMarker(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    showStatus("Location found", false);
                    addressInput.blur(); // Hide keyboard on mobile
                } else {
                    showStatus("Address not found.", true);
                }
            } catch(e) {
                showStatus("Error searching address.", true);
            }
        });

        // Helper to update start location marker
        function updateStartMarker(lat, lng) {
            userLocation = [lat, lng];
            map.setView(userLocation, 14);
            
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.circleMarker(userLocation, {
                radius: 8,
                fillColor: "#3b82f6",
                color: "#ffffff",
                weight: 3,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);

            btnRecenter.classList.remove('hidden');
        }

        // Show/Hide Status Messages
        function showStatus(msg, isError = true) {
            statusMessage.textContent = msg;
            statusMessage.className = isError 
                ? "bg-red-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-md"
                : "bg-gray-800 text-white px-4 py-2 rounded-full text-sm font-medium shadow-md";
            statusBar.classList.remove('hidden');
            setTimeout(() => statusBar.classList.add('hidden'), 4000);
        }

        // Get GPS Location
        function getUserLocation() {
            if (!navigator.geolocation) {
                showStatus("Geolocation not supported by browser.");
                return;
            }

            showStatus("Acquiring GPS...", false);

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    updateStartMarker(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    showStatus("Location access denied. Using default map center.");
                    updateStartMarker(42.242, -71.175); // Fallback coordinates
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        btnRecenter.addEventListener('click', () => {
            if (userLocation) map.setView(userLocation, 14);
        });

        // Helper: Calculate destination point given distance and bearing
        function getDestination(lat, lng, distanceMeters, bearingDegrees) {
            const brng = bearingDegrees * Math.PI / 180;
            const lat1 = lat * Math.PI / 180;
            const lon1 = lng * Math.PI / 180;

            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceMeters / EARTH_RADIUS_M) +
                                   Math.cos(lat1) * Math.sin(distanceMeters / EARTH_RADIUS_M) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distanceMeters / EARTH_RADIUS_M) * Math.cos(lat1),
                                           Math.cos(distanceMeters / EARTH_RADIUS_M) - Math.sin(lat1) * Math.sin(lat2));

            return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
        }

        // Generate the Route
        btnGenerate.addEventListener('click', async () => {
            if (!userLocation) {
                showStatus("Location not found yet. Please wait.");
                return;
            }

            const targetMiles = parseFloat(distanceInput.value);
            const isLoop = loopToggle.checked;
            const targetMeters = targetMiles * METERS_PER_MILE;

            btnGenerate.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Routing...`;
            btnGenerate.disabled = true;

            try {
                let waypoints = [];
                const [startLat, startLng] = userLocation;

                if (isLoop) {
                    // For a loop, total distance = circumference of a circle. Radius = D / (2*PI)
                    const radius = targetMeters / (2 * Math.PI);
                    
                    // Pick a random direction for the center of our loop
                    const centerBearing = Math.random() * 360;
                    const centerPoint = getDestination(startLat, startLng, radius, centerBearing);
                    
                    // Generate points around this center to force OSRM to make a loop
                    const pt1 = getDestination(centerPoint[0], centerPoint[1], radius, centerBearing + 90);
                    const pt2 = getDestination(centerPoint[0], centerPoint[1], radius, centerBearing + 180);
                    const pt3 = getDestination(centerPoint[0], centerPoint[1], radius, centerBearing + 270);

                    waypoints = [
                        [startLng, startLat],
                        [pt1[1], pt1[0]],
                        [pt2[1], pt2[0]],
                        [pt3[1], pt3[0]],
                        [startLng, startLat]
                    ];
                } else {
                    // Point to point: pick a random direction and go that distance
                    const bearing = Math.random() * 360;
                    const endPoint = getDestination(startLat, startLng, targetMeters, bearing);
                    
                    waypoints = [
                        [startLng, startLat],
                        [endPoint[1], endPoint[0]]
                    ];
                }

                // Format for OSRM: lon,lat;lon,lat...
                const coordString = waypoints.map(wp => `${wp[0]},${wp[1]}`).join(';');
                const url = `https://router.project-osrm.org/route/v1/foot/${coordString}?overview=full&geometries=geojson`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.code !== 'Ok') throw new Error("Routing failed.");

                const routeGeoJSON = data.routes[0].geometry;
                const actualDistanceMeters = data.routes[0].distance;
                const actualMiles = (actualDistanceMeters / METERS_PER_MILE).toFixed(2);

                drawRoute(routeGeoJSON, isLoop);
                
                actualDistance.textContent = actualMiles;
                routeStats.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                showStatus("Failed to generate route. Try a different distance.", true);
            } finally {
                btnGenerate.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Find Route`;
                btnGenerate.disabled = false;
            }
        });

        function drawRoute(geoJSON, isLoop) {
            // Clean up old routes
            if (routeLayer) map.removeLayer(routeLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Draw new line
            routeLayer = L.geoJSON(geoJSON, {
                style: {
                    color: '#4f46e5',
                    weight: 6,
                    opacity: 0.8,
                    lineCap: 'round',
                    lineJoin: 'round'
                }
            }).addTo(map);

            // Add Markers
            const coords = geoJSON.coordinates;
            const start = [coords[0][1], coords[0][0]];
            const end = [coords[coords.length-1][1], coords[coords.length-1][0]];

            const startIcon = L.divIcon({
                html: `<div class="bg-green-500 w-4 h-4 rounded-full border-2 border-white shadow-md"></div>`,
                className: '', iconSize: [16, 16], iconAnchor: [8, 8]
            });
            markers.push(L.marker(start, { icon: startIcon }).addTo(map));

            if (!isLoop) {
                const endIcon = L.divIcon({
                    html: `<div class="bg-red-500 w-4 h-4 rounded-full border-2 border-white shadow-md"></div>`,
                    className: '', iconSize: [16, 16], iconAnchor: [8, 8]
                });
                markers.push(L.marker(end, { icon: endIcon }).addTo(map));
            }

            // Fit map to route bounds, making room for the bottom panel
            map.fitBounds(routeLayer.getBounds(), {
                paddingBottomRight: [0, 350], 
                paddingTopLeft: [20, 20]
            });
        }

        // Run map initialization after DOM loads
        window.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
