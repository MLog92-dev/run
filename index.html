<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Run Route Finder</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* iOS style range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            cursor: pointer;
            margin-top: -10px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 3px;
        }
        
        /* iOS style toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }
        .toggle-checkbox {
            right: 4px;
            z-index: 1;
            border-color: #e2e8f0;
            transition: all 0.2s ease;
        }
        .toggle-label {
            background-color: #cbd5e1;
            transition: all 0.2s ease;
        }

        #map { height: 100dvh; width: 100vw; }
        
        /* Safe area handling for iOS */
        .controls-panel {
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
        }

        /* Hide default number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Hide scrollbar for POI list */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="overflow-hidden bg-gray-100 font-sans text-gray-900 antialiased">

    <!-- Map Area -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- Notification / Status Banner -->
    <div id="status-bar" class="absolute top-4 left-4 right-4 z-20 flex justify-center pointer-events-none transition-all duration-300 opacity-0 transform -translate-y-2">
        <div id="status-message" class="bg-gray-900/95 backdrop-blur text-white px-4 py-2.5 rounded-full text-sm font-medium shadow-lg pointer-events-auto">
            Status message
        </div>
    </div>

    <!-- Current Position/Recenter Button -->
    <button id="btn-recenter" class="absolute top-4 right-4 z-10 bg-white p-3 rounded-full shadow-lg text-gray-700 active:bg-gray-100 hidden transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    </button>

    <!-- Slide-up Bottom Control Panel -->
    <div id="control-panel" class="absolute bottom-0 left-0 right-0 z-10 bg-white/95 backdrop-blur-md rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.12)] controls-panel border-t border-gray-100 transition-all duration-300 transform translate-y-0">
        
        <!-- Toggle Header (Drag Bar and quick metrics) -->
        <div id="panel-header" class="pt-4 pb-2 px-6 cursor-pointer flex flex-col items-center">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mb-1"></div>
            <div id="route-quick-stats" class="hidden text-center text-sm font-semibold text-gray-700 mb-1">
                Selected: <span id="actual-distance" class="text-blue-600 font-bold">0.00</span> mi route
            </div>
            <svg id="panel-chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 transition-transform duration-300"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <!-- Main Form Fields (collapsible) -->
        <div id="panel-content" class="px-6 pb-2 max-h-[70vh] overflow-y-auto transition-all duration-300">
            
            <!-- Location Setup -->
            <div class="mb-5">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block">Starting Point</label>
                <div class="flex space-x-1 mb-2.5 bg-gray-100 p-1 rounded-xl">
                    <button id="mode-gps" class="flex-1 py-1.5 text-xs font-semibold bg-white shadow rounded-lg text-blue-600 transition">My GPS</button>
                    <button id="mode-address" class="flex-1 py-1.5 text-xs font-semibold text-gray-500 rounded-lg transition hover:text-gray-700">Address</button>
                    <button id="mode-map" class="flex-1 py-1.5 text-xs font-semibold text-gray-500 rounded-lg transition hover:text-gray-700">Tap Map</button>
                </div>
                
                <!-- Hidden Address Query UI -->
                <div id="address-container" class="hidden flex gap-2">
                    <input type="text" id="address-input" placeholder="Enter street, city or zip" class="flex-1 border border-gray-200 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-blue-500 bg-white">
                    <button id="btn-search-address" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-xl text-sm font-semibold transition">Search</button>
                </div>
                
                <!-- Hidden Manual Point Selection Prompt -->
                <div id="map-prompt" class="hidden text-xs text-blue-600 font-medium text-center py-2.5 bg-blue-50 rounded-xl border border-blue-100">
                    Tap anywhere on the map to set your runner icon.
                </div>
            </div>

            <!-- Target Run Distance Inputs -->
            <div class="flex justify-between items-end mb-2">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Target Distance</label>
                <div class="flex items-baseline text-blue-600">
                    <input type="number" id="distance-input" value="3.0" min="0.1" step="0.1" class="text-2xl font-bold bg-transparent text-right w-20 focus:outline-none border-b border-transparent focus:border-blue-300 transition-colors">
                    <span class="text-sm font-semibold text-gray-400 ml-0.5">mi</span>
                </div>
            </div>
            
            <!-- Slider Controls with customizable Max Boundary -->
            <div class="mb-5 flex items-center gap-4">
                <div class="flex-1 relative pt-1">
                    <input type="range" id="distance-slider" min="0.5" max="15" step="0.5" value="3.0">
                </div>
                <div class="flex flex-col items-center">
                    <label for="slider-max-input" class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">Max (mi)</label>
                    <input type="number" id="slider-max-input" value="15" min="1" class="w-12 text-center text-xs font-semibold border-b border-gray-300 focus:outline-none focus:border-blue-500 bg-transparent text-gray-600 py-0.5">
                </div>
            </div>

            <!-- Loop Settings Toggle -->
            <div class="flex items-center justify-between mb-6 bg-gray-50 p-3.5 rounded-2xl border border-gray-100">
                <div>
                    <div class="text-sm font-semibold text-gray-800">Round Trip Route</div>
                    <div class="text-xs text-gray-400">Start and end at same point</div>
                </div>
                
                <div class="relative inline-block w-14 align-middle select-none transition duration-200">
                    <input type="checkbox" name="toggle" id="loop-toggle" class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 appearance-none cursor-pointer" checked/>
                    <label for="loop-toggle" class="toggle-label block overflow-hidden h-7 rounded-full bg-gray-200 cursor-pointer"></label>
                </div>
            </div>

            <!-- Points of Interest Section -->
            <div id="poi-section" class="mb-2 hidden">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block">Points of Interest</label>
                <div id="poi-list" class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                    <!-- POI chips will be injected here -->
                </div>
            </div>
        </div>

        <!-- Persistent Generate Button (Outside collapsible content) -->
        <div class="px-6 pb-2 pt-2 bg-white rounded-t-xl">
            <button id="btn-generate" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 px-4 rounded-2xl shadow-lg transition duration-150 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                Find Route
            </button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // App State
        let map;
        let userLocation = null;
        let routeLayer = null;
        let markers = [];
        let poiMarkers = [];
        let startMarker = null;
        let locationMode = 'gps';
        let isPanelOpen = true;
        
        // Element Hooks
        const distanceSlider = document.getElementById('distance-slider');
        const distanceInput = document.getElementById('distance-input');
        const sliderMaxInput = document.getElementById('slider-max-input');
        const loopToggle = document.getElementById('loop-toggle');
        const btnGenerate = document.getElementById('btn-generate');
        const btnRecenter = document.getElementById('btn-recenter');
        const statusBar = document.getElementById('status-bar');
        const statusMessage = document.getElementById('status-message');
        const routeQuickStats = document.getElementById('route-quick-stats');
        const actualDistance = document.getElementById('actual-distance');

        const panelHeader = document.getElementById('panel-header');
        const panelContent = document.getElementById('panel-content');
        const panelChevron = document.getElementById('panel-chevron');
        const controlPanel = document.getElementById('control-panel');

        const modeGps = document.getElementById('mode-gps');
        const modeAddress = document.getElementById('mode-address');
        const modeMap = document.getElementById('mode-map');
        const addressContainer = document.getElementById('address-container');
        const mapPrompt = document.getElementById('map-prompt');
        const addressInput = document.getElementById('address-input');
        const btnSearchAddress = document.getElementById('btn-search-address');
        const poiSection = document.getElementById('poi-section');
        const poiList = document.getElementById('poi-list');

        // Conversion and Coordinate Constants
        const METERS_PER_MILE = 1609.34;
        const EARTH_RADIUS_M = 6371e3;

        // Init App and Map Setup
        function initMap() {
            // Default center based on location
            map = L.map('map', { zoomControl: false }).setView([42.24, -71.17], 13);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors',
                maxZoom: 19
            }).addTo(map);

            // Listen for taps when Map Tapping is active
            map.on('click', (e) => {
                if (locationMode === 'map') {
                    updateStartMarker(e.latlng.lat, e.latlng.lng);
                }
            });

            getUserLocation();
        }

        // Synchronize Slider and Direct Input Fields
        distanceSlider.addEventListener('input', (e) => {
            distanceInput.value = parseFloat(e.target.value).toFixed(1);
        });

        distanceInput.addEventListener('change', (e) => {
            let val = parseFloat(e.target.value);
            if (isNaN(val) || val <= 0) val = 1.0;
            distanceInput.value = val.toFixed(1);
            
            const currentSliderMax = parseFloat(distanceSlider.max);
            if (val > currentSliderMax) {
                const newMax = Math.ceil(val);
                distanceSlider.max = newMax;
                sliderMaxInput.value = newMax;
            }
            distanceSlider.value = val;
        });

        // Set Slider Maximum Directly
        sliderMaxInput.addEventListener('change', (e) => {
            let maxVal = parseFloat(e.target.value);
            if (isNaN(maxVal) || maxVal <= 0.5) maxVal = 1;
            
            sliderMaxInput.value = maxVal;
            distanceSlider.max = maxVal;
            
            if (parseFloat(distanceInput.value) > maxVal) {
                distanceSlider.value = maxVal;
                distanceInput.value = maxVal.toFixed(1);
            }
        });

        // Expand and Collapse UI Panel Drawer
        function togglePanel(forceState) {
            isPanelOpen = forceState !== undefined ? forceState : !isPanelOpen;
            if (isPanelOpen) {
                panelContent.classList.remove('hidden');
                panelChevron.style.transform = 'rotate(0deg)';
            } else {
                panelContent.classList.add('hidden');
                panelChevron.style.transform = 'rotate(180deg)';
            }
        }

        panelHeader.addEventListener('click', () => togglePanel());

        // Switch Starting Point Methods (GPS, Text Search, Map Selection)
        function switchMode(newMode) {
            locationMode = newMode;
            
            [modeGps, modeAddress, modeMap].forEach(btn => {
                btn.classList.remove('bg-white', 'shadow', 'text-blue-600');
                btn.classList.add('text-gray-500');
            });
            
            addressContainer.classList.add('hidden');
            mapPrompt.classList.add('hidden');

            if (newMode === 'gps') {
                modeGps.classList.add('bg-white', 'shadow', 'text-blue-600');
                modeGps.classList.remove('text-gray-500');
                getUserLocation();
            } else if (newMode === 'address') {
                modeAddress.classList.add('bg-white', 'shadow', 'text-blue-600');
                modeAddress.classList.remove('text-gray-500');
                addressContainer.classList.remove('hidden');
            } else if (newMode === 'map') {
                modeMap.classList.add('bg-white', 'shadow', 'text-blue-600');
                modeMap.classList.remove('text-gray-500');
                mapPrompt.classList.remove('hidden');
            }
        }

        modeGps.addEventListener('click', () => switchMode('gps'));
        modeAddress.addEventListener('click', () => switchMode('address'));
        modeMap.addEventListener('click', () => switchMode('map'));

        // Geocoding Search Endpoint integration (OSM Nominatim API)
        btnSearchAddress.addEventListener('click', async () => {
            const addr = addressInput.value.trim();
            if (!addr) return;
            
            try {
                showStatus("Searching address...", false);
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
                const data = await res.json();
                
                if (data && data.length > 0) {
                    updateStartMarker(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    showStatus("Location set successfully", false);
                    addressInput.blur();
                } else {
                    showStatus("Could not locate address.", true);
                }
            } catch(e) {
                showStatus("Geocoding lookup error.", true);
            }
        });

        // Move current point marker
        function updateStartMarker(lat, lng) {
            userLocation = [lat, lng];
            map.setView(userLocation, 14);
            
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.circleMarker(userLocation, {
                radius: 8,
                fillColor: "#2563eb",
                color: "#ffffff",
                weight: 3,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);

            btnRecenter.classList.remove('hidden');
        }

        // Show/Hide Temporary Notification Toast Banner
        function showStatus(msg, isError = true) {
            statusMessage.textContent = msg;
            if (isError) {
                statusMessage.className = "bg-red-500 text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-lg pointer-events-auto";
            } else {
                statusMessage.className = "bg-gray-900/95 backdrop-blur text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-lg pointer-events-auto";
            }
            
            statusBar.classList.remove('opacity-0', '-translate-y-2');
            statusBar.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                statusBar.classList.remove('opacity-100', 'translate-y-0');
                statusBar.classList.add('opacity-0', '-translate-y-2');
            }, 3500);
        }

        // Acquire System GPS Signals
        function getUserLocation() {
            if (!navigator.geolocation) {
                showStatus("GPS is unsupported in this browser.");
                return;
            }

            showStatus("Searching for GPS point...", false);

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    updateStartMarker(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    showStatus("GPS access denied. Defaulting marker.");
                    updateStartMarker(42.242, -71.175);
                },
                { enableHighAccuracy: true, timeout: 6000 }
            );
        }

        btnRecenter.addEventListener('click', () => {
            if (userLocation) map.setView(userLocation, 14);
        });

        // Math helper: plot point coordinates given distance + heading bearing
        function getDestination(lat, lng, distanceMeters, bearingDegrees) {
            const brng = bearingDegrees * Math.PI / 180;
            const lat1 = lat * Math.PI / 180;
            const lon1 = lng * Math.PI / 180;

            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceMeters / EARTH_RADIUS_M) +
                                   Math.cos(lat1) * Math.sin(distanceMeters / EARTH_RADIUS_M) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distanceMeters / EARTH_RADIUS_M) * Math.cos(lat1),
                                           Math.cos(distanceMeters / EARTH_RADIUS_M) - Math.sin(lat1) * Math.sin(lat2));

            return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
        }

        // Generate the Running Path
        btnGenerate.addEventListener('click', async () => {
            if (!userLocation) {
                showStatus("No start location selected.");
                return;
            }

            const targetMiles = parseFloat(distanceInput.value);
            const isLoop = loopToggle.checked;
            const targetMeters = targetMiles * METERS_PER_MILE;

            btnGenerate.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...`;
            btnGenerate.disabled = true;

            try {
                let waypoints = [];
                const [startLat, startLng] = userLocation;

                if (isLoop) {
                    // Create a balanced balloon layout.
                    // This creates a polygon with 3 guide waypoints pulling directly away in a unified direction.
                    // OSRM traces the roads smoothly outward on one side and loops back on the other, ensuring 
                    // the path does not cross back through the starting point midway.
                    const radius = targetMeters / 4; 
                    const baseBearing = Math.random() * 360;
                    
                    const pt1 = getDestination(startLat, startLng, radius, baseBearing - 45);
                    const pt2 = getDestination(startLat, startLng, radius * 1.35, baseBearing);
                    const pt3 = getDestination(startLat, startLng, radius, baseBearing + 45);

                    waypoints = [
                        [startLng, startLat],
                        [pt1[1], pt1[0]],
                        [pt2[1], pt2[0]],
                        [pt3[1], pt3[0]],
                        [startLng, startLat]
                    ];
                } else {
                    // Out-and-back or single direction routing
                    const bearing = Math.random() * 360;
                    const endPoint = getDestination(startLat, startLng, targetMeters, bearing);
                    
                    waypoints = [
                        [startLng, startLat],
                        [endPoint[1], endPoint[0]]
                    ];
                }

                // Call OSRM Walking Engine Service
                const coordString = waypoints.map(wp => `${wp[0]},${wp[1]}`).join(';');
                const url = `https://router.project-osrm.org/route/v1/foot/${coordString}?overview=full&geometries=geojson`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.code !== 'Ok') throw new Error("OSRM Routing failure.");

                const routeGeoJSON = data.routes[0].geometry;
                const actualDistanceMeters = data.routes[0].distance;
                const actualMiles = (actualDistanceMeters / METERS_PER_MILE).toFixed(2);

                drawRoute(routeGeoJSON, isLoop);
                
                // Show statistics inside collapsed header
                actualDistance.textContent = actualMiles;
                routeQuickStats.classList.remove('hidden');
                
                // Compress panel view to show full map
                togglePanel(false);

            } catch (err) {
                console.error(err);
                showStatus("Routing error. Try another distance value.", true);
            } finally {
                btnGenerate.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Find Route`;
                btnGenerate.disabled = false;
            }
        });

        // Plot resulting vectors on Leaflet Canvas
        function drawRoute(geoJSON, isLoop) {
            if (routeLayer) map.removeLayer(routeLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            poiMarkers.forEach(m => map.removeLayer(m));
            poiMarkers = [];
            
            poiSection.classList.add('hidden');
            poiList.innerHTML = '';

            routeLayer = L.geoJSON(geoJSON, {
                style: {
                    color: '#2563eb',
                    weight: 6,
                    opacity: 0.85,
                    lineCap: 'round',
                    lineJoin: 'round'
                }
            }).addTo(map);

            const coords = geoJSON.coordinates;
            const start = [coords[0][1], coords[0][0]];
            const end = [coords[coords.length-1][1], coords[coords.length-1][0]];

            // Custom green and red flags for Start / End visualization
            const startIcon = L.divIcon({
                html: `<div class="bg-emerald-500 w-4.5 h-4.5 rounded-full border-2 border-white shadow-lg"></div>`,
                className: '', iconSize: [18, 18], iconAnchor: [9, 9]
            });
            markers.push(L.marker(start, { icon: startIcon }).addTo(map));

            if (!isLoop) {
                const endIcon = L.divIcon({
                    html: `<div class="bg-rose-500 w-4.5 h-4.5 rounded-full border-2 border-white shadow-lg"></div>`,
                    className: '', iconSize: [18, 18], iconAnchor: [9, 9]
                });
                markers.push(L.marker(end, { icon: endIcon }).addTo(map));
            }

            // Reposition viewport leaving ample space above the bottom drawer controls
            map.fitBounds(routeLayer.getBounds(), {
                paddingBottomRight: [0, 140], 
                paddingTopLeft: [24, 24]
            });
            
            // Trigger POI Search
            loadPOIs(routeLayer.getBounds());
        }

        async function loadPOIs(bounds) {
            const bbox = `${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()}`;
            
            const query = `
                [out:json][timeout:10];
                (
                  node["amenity"~"drinking_water|toilets|cafe"](${bbox});
                  node["leisure"~"park"](${bbox});
                  node["tourism"~"viewpoint"](${bbox});
                );
                out body 15;
            `;
            
            try {
                poiList.innerHTML = `<div class="text-xs text-gray-500 italic py-2">Searching for POIs along route...</div>`;
                poiSection.classList.remove('hidden');
                
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                poiList.innerHTML = '';
                
                if (!data.elements || data.elements.length === 0) {
                    poiList.innerHTML = `<div class="text-xs text-gray-500 italic py-2">No prominent POIs found.</div>`;
                    return;
                }

                // Deduplicate items based on coordinates to avoid clutter
                const uniqueElements = [];
                const seenCoords = new Set();
                
                for (const el of data.elements) {
                    const coordKey = `${el.lat.toFixed(4)},${el.lon.toFixed(4)}`;
                    if (!seenCoords.has(coordKey)) {
                        seenCoords.add(coordKey);
                        uniqueElements.push(el);
                    }
                }

                uniqueElements.slice(0, 10).forEach(el => {
                    let type = 'Location';
                    let icon = '📍';
                    let color = 'bg-gray-500';
                    
                    if (el.tags.amenity === 'drinking_water') { type = 'Water'; icon = '💧'; color = 'bg-blue-500'; }
                    else if (el.tags.amenity === 'toilets') { type = 'Restroom'; icon = '🚻'; color = 'bg-slate-500'; }
                    else if (el.tags.amenity === 'cafe') { type = 'Cafe'; icon = '☕'; color = 'bg-amber-600'; }
                    else if (el.tags.leisure === 'park') { type = 'Park'; icon = '🌳'; color = 'bg-green-500'; }
                    else if (el.tags.tourism === 'viewpoint') { type = 'Viewpoint'; icon = '🏔️'; color = 'bg-purple-500'; }

                    const name = el.tags.name || type;

                    const markerIcon = L.divIcon({
                        html: `<div class="flex items-center justify-center w-6 h-6 ${color} text-white text-xs rounded-full shadow-md border-2 border-white">${icon}</div>`,
                        className: '',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    
                    const marker = L.marker([el.lat, el.lon], { icon: markerIcon }).bindPopup(name).addTo(map);
                    poiMarkers.push(marker);

                    const chip = document.createElement('div');
                    chip.className = 'flex-shrink-0 bg-white border border-gray-200 rounded-xl p-2 flex items-center gap-2 shadow-sm cursor-pointer hover:bg-gray-50 transition-colors';
                    chip.innerHTML = `<span class="text-base leading-none">${icon}</span><span class="text-xs font-semibold text-gray-700 whitespace-nowrap pr-1">${name}</span>`;
                    
                    chip.addEventListener('click', () => {
                        map.setView([el.lat, el.lon], 16);
                        marker.openPopup();
                    });
                    
                    poiList.appendChild(chip);
                });
                
            } catch (err) {
                console.error("POI Error:", err);
                poiList.innerHTML = `<div class="text-xs text-gray-500 italic py-2">Could not load POIs.</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
